:root{
  --bg:#070C0A; --surface:#0D1611; --surface-2:#0A130E; --panel:#131F19; --panel-2:#1A2A21;
  --ink:#ECF3ED; --ink-2:#A4B7AB; --ink-3:#6F8175;
  --accent:#36C28B; --accent-strong:#77E7B7; --accent-soft:#123829; --accent-dim:#2C5A43; --foil:#5AA9C9;
  --line:#213027; --line-2:#31463B; --hair:rgba(236,243,237,.07);
  --display:"Bricolage Grotesque","Hanken Grotesk",system-ui,sans-serif;
  --sans:"Hanken Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  --mono:"Space Mono",ui-monospace,"SF Mono",Menlo,Consolas,monospace;
  --ease:cubic-bezier(.2,.7,.2,1);
  --maxw:1180px;
}
html,body{ height:100%; }
body{ margin:0; min-height:100%; color:var(--ink); font-family:var(--sans); line-height:1.5;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  background:
    radial-gradient(120% 80% at 12% -8%, rgba(54,194,139,.10), transparent 46%),
    radial-gradient(90% 72% at 108% 112%, rgba(90,169,201,.05), transparent 50%),
    linear-gradient(170deg, var(--bg) 0%, #05100B 100%);
  background-attachment:fixed;
}
button{ font-family:var(--mono); cursor:pointer; }
:focus-visible{ outline:2px solid var(--accent); outline-offset:3px; border-radius:6px; }
.wrap{ max-width:var(--maxw); margin:0 auto; padding:clamp(20px,4vw,52px) clamp(18px,4vw,40px) 60px; }

/* ---------- brand masthead ---------- */
.masthead{ display:flex; align-items:center; gap:13px; }
.paw{ width:30px; height:30px; color:var(--accent); filter:drop-shadow(0 0 7px rgba(54,194,139,.35)); flex:none; }
.mast__wm{ font-family:var(--display); font-weight:800; font-size:22px; letter-spacing:-.02em; line-height:1; }
.mast__tag{ font-family:var(--mono); font-size:9px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-3); margin-top:3px; }

/* ---------- home ---------- */
.home__h{ font-family:var(--display); font-weight:800; font-size:clamp(30px,5vw,46px); letter-spacing:-.03em; margin:28px 0 8px; text-wrap:balance; }
.home__h .accent{ color:var(--accent); }
.home__sub{ font-size:clamp(15px,2vw,18px); color:var(--ink-2); max-width:62ch; margin:0 0 30px; }
.pgrid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
@media(max-width:860px){ .pgrid{ grid-template-columns:repeat(2,1fr); } }
@media(max-width:560px){ .pgrid{ grid-template-columns:1fr; } }
.pcard{ position:relative; text-align:left; background:linear-gradient(165deg,var(--panel),var(--panel-2));
  border:1px solid var(--line); border-radius:16px; padding:22px 22px 18px; display:flex; flex-direction:column; gap:11px;
  color:inherit; box-shadow:inset 0 1px 0 var(--hair); min-height:172px; overflow:hidden;
  transition:transform .25s var(--ease),border-color .25s,box-shadow .25s; }
.pcard:hover{ transform:translateY(-4px); border-color:var(--accent-dim); box-shadow:0 20px 44px -24px #000,inset 0 1px 0 var(--hair); }
.pcard__paw{ width:26px; height:26px; color:var(--accent-dim); transition:color .25s,filter .25s; }
.pcard:hover .pcard__paw{ color:var(--accent); filter:drop-shadow(0 0 6px rgba(54,194,139,.4)); }
.pcard__name{ font-family:var(--display); font-weight:700; font-size:22px; letter-spacing:-.01em; line-height:1.04; }
.pcard__role{ font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-3); }
.pcard__meta{ margin-top:auto; display:flex; align-items:baseline; justify-content:space-between; gap:10px; padding-top:13px; border-top:1px solid var(--line); }
.pcard__count{ font-family:var(--display); font-weight:800; font-size:25px; color:var(--accent); line-height:1; letter-spacing:-.02em; }
.pcard__count small{ font-family:var(--mono); font-weight:400; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); margin-left:6px; }
.pcard__range{ font-family:var(--mono); font-size:10.5px; letter-spacing:.04em; color:var(--ink-2); }
.fullcard{ grid-column:1/-1; min-height:0; flex-direction:row; align-items:center; gap:18px;
  background:linear-gradient(150deg,var(--accent-soft),color-mix(in srgb,var(--accent-soft) 52%,#000)); border-color:var(--accent-dim); }
.fullcard .pcard__paw{ color:var(--accent); width:30px; height:30px; }
.fullcard .pcard__name{ font-size:20px; }
.fullcard__meta{ margin-left:auto; display:flex; align-items:baseline; gap:14px; }
.fullcard .pcard__count{ color:var(--accent-strong); }

.hint{ margin-top:28px; font-family:var(--mono); font-size:11px; letter-spacing:.04em; color:var(--ink-3); display:flex; gap:20px; flex-wrap:wrap; align-items:center; }
.hint kbd{ font-family:var(--mono); background:var(--panel); border:1px solid var(--line-2); border-bottom-width:2px; border-radius:5px; padding:1px 6px; color:var(--ink-2); font-size:10px; }

/* ---------- runsheet ---------- */
.rtop{ display:flex; align-items:center; gap:16px; margin-bottom:22px; flex-wrap:wrap; }
.backbtn{ background:transparent; border:1px solid var(--line-2); border-radius:9px; padding:8px 13px; color:var(--ink-2); font-size:11px; letter-spacing:.08em; text-transform:uppercase; transition:color .2s,border-color .2s; }
.backbtn:hover{ color:var(--accent); border-color:var(--accent); }
.rtop__who{ display:flex; flex-direction:column; gap:3px; margin-right:auto; min-width:0; }
.rtop__name{ font-family:var(--display); font-weight:700; font-size:19px; line-height:1; letter-spacing:-.01em; }
.rtop__prog{ font-family:var(--mono); font-size:10px; letter-spacing:.09em; text-transform:uppercase; color:var(--ink-3); }
.rnav{ display:flex; gap:8px; }
.rnav button{ background:transparent; border:1px solid var(--line-2); border-radius:9px; padding:8px 14px; color:var(--ink-2); font-size:12px; letter-spacing:.05em; transition:color .2s,border-color .2s,box-shadow .2s; }
.rnav button:hover:not(:disabled){ color:var(--accent); border-color:var(--accent); box-shadow:0 0 12px -5px var(--accent); }
.rnav button:disabled{ opacity:.3; cursor:default; }

.rmain{ display:grid; grid-template-columns:minmax(0,1.15fr) minmax(0,1fr); gap:26px; align-items:start; }
@media(max-width:900px){ .rmain{ grid-template-columns:1fr; gap:20px; } }

.preview{ background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:0 22px 48px -28px #000; position:sticky; top:20px; }
.preview__bar{ display:flex; align-items:center; gap:10px; padding:9px 13px; border-bottom:1px solid var(--line); background:linear-gradient(180deg,var(--panel),var(--panel-2)); }
.preview__no{ font-family:var(--mono); font-size:11px; letter-spacing:.1em; color:var(--accent); font-weight:700; }
.preview__ttl{ font-family:var(--display); font-weight:600; font-size:14px; color:var(--ink-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.replay{ margin-left:auto; background:transparent; border:1px solid var(--line-2); border-radius:7px; padding:5px 10px; color:var(--ink-2); font-size:10px; letter-spacing:.06em; text-transform:uppercase; transition:color .2s,border-color .2s; white-space:nowrap; }
.replay:hover{ color:var(--accent); border-color:var(--accent); }
.preview__frame{ position:relative; aspect-ratio:16/9; background:var(--surface-2); }
.preview__frame iframe{ position:absolute; inset:0; width:100%; height:100%; border:0; display:block; }

.script{ display:flex; flex-direction:column; gap:17px; min-width:0; }
.script__eye{ font-family:var(--mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); font-weight:700; }
.script__ttl{ font-family:var(--display); font-weight:800; font-size:clamp(23px,3.3vw,33px); letter-spacing:-.02em; line-height:1.04; margin:-5px 0 2px; text-wrap:balance; }
.block{ display:flex; flex-direction:column; gap:7px; }
.block__lab{ font-family:var(--mono); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-3); display:flex; align-items:center; gap:8px; }
.block__lab::before{ content:""; width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 7px var(--accent); flex:none; }
.focus__t{ font-size:15.5px; line-height:1.52; color:var(--ink-2); }
.say{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:11px; }
.say li{ display:flex; align-items:baseline; gap:11px; font-family:var(--sans); font-size:clamp(15px,1.75vw,17px); line-height:1.5; color:var(--ink); }
.say li::before{ content:"›"; flex:none; color:var(--accent); font-family:var(--display); font-weight:800; font-size:1.05em; }
.saytog{ margin-left:auto; display:inline-flex; background:var(--panel); border:1px solid var(--line-2); border-radius:20px; padding:2px; gap:2px; }
.saytog button{ border:0; background:transparent; color:var(--ink-3); border-radius:16px; padding:3px 12px; font-size:9px; letter-spacing:.11em; text-transform:uppercase; font-family:var(--mono); cursor:pointer; transition:color .2s,background .2s; }
.saytog button.on{ background:var(--accent-soft); color:var(--accent); }
.saytog button:hover:not(.on){ color:var(--ink-2); }
.sayp{ font-family:var(--sans); font-weight:450; font-size:clamp(15px,1.8vw,17px); line-height:1.62; color:var(--ink); border-left:2px solid var(--accent-dim); padding-left:16px; }
.chip{ align-self:flex-start; font-family:var(--mono); font-size:10.5px; letter-spacing:.03em; color:var(--ink-2); background:var(--panel); border:1px solid var(--line-2); border-radius:20px; padding:6px 13px; display:inline-flex; gap:8px; align-items:center; line-height:1.3; }
.chip b{ color:var(--accent); font-weight:700; white-space:nowrap; }

.handoff{ display:flex; align-items:center; gap:13px; padding:14px 16px; border-radius:12px;
  background:linear-gradient(150deg,var(--accent-soft),color-mix(in srgb,var(--accent-soft) 48%,#000));
  border:1px solid var(--accent-dim); color:var(--ink); }
.handoff__ic{ width:22px; height:22px; color:var(--accent); flex:none; }
.handoff__t{ font-family:var(--display); font-weight:600; font-size:16px; line-height:1.15; }
.handoff__t b{ color:var(--accent-strong); }
.handoff__k{ font-family:var(--mono); font-size:9px; letter-spacing:.13em; text-transform:uppercase; color:var(--ink-3); margin-top:3px; }
.end{ display:flex; align-items:center; gap:10px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3); padding:10px 0; }
.end::before{ content:"✦"; color:var(--accent); }

@media(prefers-reduced-motion:no-preference){
  .handoff{ animation:hpulse 2.4s ease-in-out infinite; }
  .handoff__ic{ animation:nudge 1.5s var(--ease) infinite; }
  @keyframes hpulse{ 0%,100%{ box-shadow:0 0 0 0 rgba(54,194,139,0); } 50%{ box-shadow:0 0 24px -3px rgba(54,194,139,.5); } }
  @keyframes nudge{ 0%,100%{ transform:translateX(0); } 50%{ transform:translateX(4px); } }
}

    1:"Thanks for making the time. We’re Vera, and in one line we’re the revenue-integrity layer for veterinary practices. There are five of us and we each built a piece of this, so we’ll each take you through our part. I’m Jude — let me set up why we exist.",
    2:"If you take one thing from today, take this. Vera lands in a clinic as an ambient AI scribe — that’s the wedge, it’s how we get in the door cheaply. But the business is what comes next: becoming the cross-PIMS layer that recovers the revenue every practice is already owed. The scribe gets us in; the recovery is what we’re really building. Chirag will show you why that money is just sitting there.",

    8:"So what is Vera, in plain terms? It’s an AI scribe that pays for itself — and then makes the practice money it already earned. It sits in the consult with consent, writes the notes straight back into whatever software the clinic already runs, and while it’s listening, it quietly flags the billable items that never made it onto the invoice. The scribe is the hook; the recovery is the point. Hayley will take you under the hood.",

    11:"Here’s how that becomes a company, not just a feature. Phase one, we win the room with the scribe — best-in-class, writing back into the existing PIMS, already flagging billable items it overhears. Phase two, we expand into the revenue-integrity modules — charge capture, missed-call recovery, no-show backfill, recall — and that’s the part priced on recovery. Phase three, the data across all those clinics becomes practice intelligence: benchmarking, forecasting, a network no single clinic could build alone. Land with the scribe, expand into the business, and the data becomes the moat.",
    12:"And the pricing is deliberately upside-down from what you’d expect. The scribe — tier one — is a hundred and ninety-nine dollars a seat, priced low on purpose; its job is distribution, not margin. Tier two, the recovery layer at five ninety-nine a clinic, is where the value sits — a clinic clawing back four to eight thousand a month pays only a fraction of that back to us. Tier three adds the intelligence layer. The headline for you: a clinic recovering thousands pays us a slice of it, at a seventy-five to seventy-eight percent gross margin.",

    14:"And it’s the five of us on one cap table — each of us owns a pad on the mark, fifty thousand each, equal shares. Jude on the model and the raise; Chirag Parmar on business development; me on strategy; Siyuan on marketing; Chirag Singh on risk. After the seed, the founding team still holds seventy percent — we’re built to stay. Siyuan, tell them what’s actually happening out in the market.",

    17:"And the market we’re starting in is bigger than people assume. Australians spend twenty-one billion dollars a year on their pets; vet services alone are five point seven billion, across roughly three thousand eight hundred practices and sixteen thousand vets. That’s about one and a half million dollars of revenue per practice, at gross margins of seventy-four to seventy-seven percent — and seventy-three percent of households own a pet. Big, recession-resilient, running on ageing software, and healthy enough to afford a tool that plainly pays for itself.",

    26:"And here’s what actually drives those numbers — three simple levers. More clinics: fifteen, to sixty, to a hundred and twenty. More value per clinic: blended revenue per clinic climbing from nine hundred to sixteen-fifty a month as they adopt the recovery and intelligence layers. And a balance sheet with zero debt — net assets growing every year on retained profit, from a quarter-million to one and a quarter million. Clinics, times value, compounding, debt-free.",
    27:"Which brings us to the ask. We’re raising seven hundred and fifty thousand dollars for thirty percent — a one-point-seven-five pre-money, two-and-a-half post. Here’s where it goes: forty percent into product and AI engineering, thirty-five into go-to-market for the ANZ and US push, fifteen into compliance and data residency, and ten as working-capital buffer. Founders keep seventy percent, the company stays debt-free — and remember, we’re already profitable. This money buys speed on the ANZ-to-US jump; it doesn’t buy survival.",

  var PAW='<svg class="pcard__paw" viewBox="0 0 120 120" aria-hidden="true"><g fill="currentColor"><circle cx="33" cy="39" r="7"/><circle cx="46.5" cy="59" r="7.75"/><ellipse cx="60" cy="80" rx="11.5" ry="10"/><circle cx="73.5" cy="59" r="7.75"/><circle cx="87" cy="39" r="7"/></g></svg>';
  var ARROW='<svg class="handoff__ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 12h13M13 6l6 6-6 6"/></svg>';

  var ALL=[]; for(var i=1;i<=28;i++) ALL.push(i);
  var SLIDE_PRES={}; PRES.forEach(function(p){ p.slides.forEach(function(n){ SLIDE_PRES[n]=p; }); });

  var home=document.getElementById("home"), run=document.getElementById("run");
  var rName=document.getElementById("rName"), rProg=document.getElementById("rProg"), rBody=document.getElementById("rBody");
  var pvNo=document.getElementById("pvNo"), pvTtl=document.getElementById("pvTtl"), pv=document.getElementById("pv");
  var prevBtn=document.getElementById("prevBtn"), nextBtn=document.getElementById("nextBtn");

  function pad2(n){ return String(n).padStart(2,"0"); }
  function secFor(n){
    if(n<=2) return "Opening";
    if(n<=8) return "Act 01 · Opportunity";
    if(n<=14) return "Act 02 · Product & team";
    if(n<=19) return "Act 03 · Traction & market";
    if(n<=23) return "Act 04 · Roadmap & risk";
    return "Act 05 · Finances";
  }
  function rangeStr(arr){
    var parts=[], s=arr[0], p=arr[0];
    for(var i=1;i<arr.length;i++){ if(arr[i]===p+1){ p=arr[i]; continue; } parts.push(s===p?String(s):s+"–"+p); s=p=arr[i]; }
    parts.push(s===p?String(s):s+"–"+p);
    return "Slides "+parts.join(", ");
  }
  function scopeByKey(k){ return k==="all" ? {key:"all",name:"Full run-through",role:"All five presenters",slides:ALL} : PRES.filter(function(p){return p.key===k;})[0]; }

  /* ---------- home ---------- */
  function renderHome(){
    var h='<h1 class="home__h">Pick your <span class="accent">track</span>.</h1>'
      +'<p class="home__sub">Each founder gets just their slides — what to focus on, a live preview of the real slide, and the line to say. Or run the whole deck end to end.</p>'
      +'<div class="pgrid">';
    PRES.forEach(function(p){
      h+='<button class="pcard" data-scope="'+p.key+'">'+PAW
        +'<div class="pcard__name">'+p.name+'</div>'
        +'<div class="pcard__role">'+p.role+'</div>'
        +'<div class="pcard__meta"><span class="pcard__count">'+p.slides.length+'<small>slides</small></span>'
        +'<span class="pcard__range">'+rangeStr(p.slides)+'</span></div></button>';
    });
    h+='<button class="pcard fullcard" data-scope="all">'+PAW
      +'<div><div class="pcard__name">Full run-through</div><div class="pcard__role">All five presenters · in order</div></div>'
      +'<div class="fullcard__meta"><span class="pcard__count">28<small>slides</small></span></div></button>';
    h+='</div>';
    h+='<div class="hint"><span><kbd>→</kbd> <kbd>←</kbd> navigate</span><span><kbd>Esc</kbd> back to tracks</span><span><kbd>R</kbd> replay preview</span></div>';
    home.innerHTML=h;
  }

  /* ---------- runsheet ---------- */
  var state={ scope:null, i:0 };
  var pvR=0;
  function getMode(){ try{ var q=(location.search.match(/[?&]say=(script|bullets)/)||[])[1]; if(q) return q; return localStorage.getItem("vera_say_mode")==="script"?"script":"bullets"; }catch(e){ return "bullets"; } }
  function setMode(m){ sayMode=m; try{ localStorage.setItem("vera_say_mode",m); }catch(e){} }
  var sayMode=getMode();
  function setPreview(n, reload){ if(reload) pvR++; pv.src="index.html?embed"+(pvR?"&r="+pvR:"")+"#"+n; }

  function renderCard(){
    var n=state.scope.slides[state.i], d=SLIDES[n], p=SLIDE_PRES[n];
    rName.textContent = (state.scope.key==="all") ? p.name : state.scope.name;
    rProg.textContent = ((state.scope.key==="all") ? "Full run-through" : state.scope.role) + "  ·  " + (state.i+1) + " / " + state.scope.slides.length;
    prevBtn.disabled = state.i===0;
    nextBtn.disabled = state.i===state.scope.slides.length-1;

    var html='<div class="script__eye">Slide '+pad2(n)+"  ·  "+secFor(n)+'</div>'
      +'<h2 class="script__ttl">'+d.t+'</h2>'
      +'<div class="block"><div class="block__lab">Focus</div><div class="focus__t">'+d.f+'</div></div>'
      +'<div id="sayWrap" class="block"></div>';
    if(BEATS[n]) html+='<div class="chip"><b>▸ Builds in steps</b> '+BEATS[n]+'</div>';
    if(HANDOFF[n]) html+='<div class="handoff">'+ARROW+'<div><div class="handoff__t">Hand off to <b>'+HANDOFF[n]+'</b></div><div class="handoff__k">End of your section — pass the baton</div></div></div>';
    else if(n===28) html+='<div class="end">End of deck — thank the room</div>';
    rBody.innerHTML=html;
    paintSay();

    pvNo.textContent=pad2(n); pvTtl.textContent=d.t;
    setPreview(n,false);
  }

  function paintSay(){
    var wrap=document.getElementById("sayWrap"); if(!wrap) return;
    var n=state.scope.slides[state.i], d=SLIDES[n];
    var pts=Array.isArray(d.s)?d.s:[d.s];
    var body=(sayMode==="script"&&PARA[n]) ? '<div class="sayp">'+PARA[n]+'</div>'
      : '<ul class="say">'+pts.map(function(x){return "<li>"+x+"</li>";}).join("")+'</ul>';
    wrap.innerHTML='<div class="block__lab saylab"><span>Say</span><span class="saytog">'
      +'<button data-saymode="bullets"'+(sayMode!=="script"?' class="on"':'')+'>Bullets</button>'
      +'<button data-saymode="script"'+(sayMode==="script"?' class="on"':'')+'>Script</button>'
      +'</span></div>'+body;
  }

  function go(scopeKey, idx){
    var sc=scopeByKey(scopeKey); if(!sc){ showHome(); return; }
    state.scope=sc; state.i=Math.max(0,Math.min(sc.slides.length-1, idx||0));
    home.hidden=true; run.hidden=false; window.scrollTo(0,0);
    renderCard(); syncHash();
  }
  function showHome(){ run.hidden=true; home.hidden=false; pv.src="about:blank";
    if(location.hash && location.hash!=="#home") history.replaceState(null,"","#"); }
  function next(){ if(state.i<state.scope.slides.length-1){ state.i++; renderCard(); syncHash(); } }
  function prev(){ if(state.i>0){ state.i--; renderCard(); syncHash(); } }
  function syncHash(){ history.replaceState(null,"","#"+state.scope.key+"/"+state.scope.slides[state.i]); }

  /* ---------- routing ---------- */
  function applyRoute(){
    var m=(location.hash||"").replace(/^#/,"");
    if(!m || m==="home"){ showHome(); return; }
    var parts=m.split("/"), sc=scopeByKey(parts[0]);
    if(!sc){ showHome(); return; }
    var idx=0; if(parts[1]){ var j=sc.slides.indexOf(parseInt(parts[1],10)); if(j>=0) idx=j; }
    go(parts[0], idx);
  }

  /* ---------- wiring ---------- */
  home.addEventListener("click", function(e){ var b=e.target.closest("[data-scope]"); if(b) go(b.dataset.scope,0); });
  document.getElementById("backBtn").addEventListener("click", showHome);
  prevBtn.addEventListener("click", prev);
  nextBtn.addEventListener("click", next);
  document.getElementById("replayBtn").addEventListener("click", function(){ setPreview(state.scope.slides[state.i], true); });
  run.addEventListener("click", function(e){ var b=e.target.closest("[data-saymode]"); if(b){ setMode(b.dataset.saymode); paintSay(); } });
  document.addEventListener("keydown", function(e){
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(run.hidden) return;
    if(e.key==="ArrowRight"||e.key==="PageDown"){ next(); e.preventDefault(); }
    else if(e.key==="ArrowLeft"||e.key==="PageUp"){ prev(); e.preventDefault(); }
    else if(e.key==="Escape"){ showHome(); }
    else if(e.key==="r"||e.key==="R"){ setPreview(state.scope.slides[state.i], true); }
  });
  window.addEventListener("hashchange", applyRoute);

  renderHome();
  applyRoute();
})();
</script>
</body>
</html>
